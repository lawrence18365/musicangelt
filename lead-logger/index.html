<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, noarchive">
  <title>MusicAngel Lead Logger</title>
  <style>
    :root {
      color-scheme: light;
      --ink: #14171f;
      --muted: #606779;
      --soft: #f4f6fa;
      --paper: #f8fafc;
      --panel: #ffffff;
      --line: #d9dee8;
      --focus: #265bd7;
      --green: #17765a;
      --green-soft: #e1f4ec;
      --blue: #235eac;
      --blue-soft: #e5effc;
      --amber: #8a5a00;
      --amber-soft: #fff0cc;
      --red: #a23b2a;
      --red-soft: #fae6e1;
      --slate: #475569;
      --slate-soft: #e8edf4;
      --shadow: 0 14px 36px rgba(15, 23, 42, 0.10);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    html {
      min-height: 100%;
      background: var(--paper);
    }

    body {
      min-height: 100%;
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(35, 94, 172, 0.07), transparent 260px),
        var(--paper);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      line-height: 1.35;
    }

    button,
    input,
    textarea {
      font: inherit;
    }

    button,
    a {
      -webkit-tap-highlight-color: transparent;
    }

    .shell {
      width: min(100%, 780px);
      margin: 0 auto;
      padding: 14px;
    }

    .topbar {
      position: sticky;
      top: 0;
      z-index: 10;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: center;
      padding: 12px 0;
      background: linear-gradient(180deg, var(--paper) 76%, rgba(248, 250, 252, 0));
    }

    h1 {
      margin: 0;
      font-family: Georgia, "Times New Roman", serif;
      font-size: 27px;
      font-weight: 650;
      line-height: 1.05;
    }

    .sync {
      min-height: 36px;
      padding: 8px 11px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.9);
      color: var(--muted);
      font-size: 13px;
      font-weight: 750;
      white-space: nowrap;
    }

    .auth,
    .empty,
    .error {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: var(--shadow);
    }

    .auth {
      display: grid;
      gap: 10px;
      padding: 14px;
      margin: 8px 0 14px;
    }

    .auth-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    label {
      display: block;
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0;
      text-transform: uppercase;
    }

    input,
    textarea {
      width: 100%;
      min-height: 48px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      color: var(--ink);
      padding: 11px 12px;
      font-size: 16px;
    }

    textarea {
      min-height: 80px;
      resize: vertical;
    }

    input:focus,
    textarea:focus,
    button:focus-visible,
    a:focus-visible,
    summary:focus-visible {
      outline: 3px solid rgba(38, 91, 215, 0.24);
      outline-offset: 2px;
      border-color: var(--focus);
    }

    .primary,
    .secondary,
    .action-button,
    .save-extra,
    .settled-toggle {
      min-height: 48px;
      border: 1px solid transparent;
      border-radius: var(--radius);
      padding: 11px 13px;
      font-weight: 850;
      cursor: pointer;
    }

    .primary {
      background: var(--ink);
      color: #fff;
    }

    .secondary,
    .settled-toggle {
      border-color: var(--line);
      background: #fff;
      color: var(--ink);
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 8px;
      margin: 8px 0 12px;
    }

    .metric {
      min-width: 0;
      padding: 11px 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: rgba(255, 255, 255, 0.9);
    }

    .metric strong {
      display: block;
      font-size: 24px;
      line-height: 1;
    }

    .metric span {
      display: block;
      margin-top: 5px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 750;
      white-space: nowrap;
    }

    .lead-list {
      display: grid;
      gap: 12px;
      padding-bottom: 32px;
    }

    .group {
      display: grid;
      gap: 8px;
    }

    .group-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      margin: 4px 2px 0;
      color: var(--muted);
      font-size: 13px;
      font-weight: 850;
      text-transform: uppercase;
    }

    .lead-card {
      border: 1px solid var(--line);
      border-left-width: 5px;
      border-radius: var(--radius);
      background: var(--panel);
      box-shadow: 0 8px 26px rgba(15, 23, 42, 0.06);
      overflow: hidden;
      transition: border-color 160ms ease, box-shadow 160ms ease, transform 160ms ease;
    }

    .lead-card.selected {
      border-color: var(--focus);
      box-shadow: var(--shadow);
    }

    .lead-card.saved {
      transform: translateY(-1px);
      box-shadow: 0 0 0 3px rgba(23, 118, 90, 0.18), var(--shadow);
    }

    .lead-card.status-new {
      border-left-color: var(--amber);
    }

    .lead-card.status-working,
    .lead-card.status-quoted {
      border-left-color: var(--blue);
    }

    .lead-card.status-booked {
      border-left-color: var(--green);
    }

    .lead-card.status-cold,
    .lead-card.status-lost {
      border-left-color: var(--red);
    }

    .lead-select {
      width: 100%;
      display: grid;
      gap: 9px;
      min-height: 110px;
      border: 0;
      background: transparent;
      color: inherit;
      padding: 14px;
      text-align: left;
      cursor: pointer;
    }

    .lead-top {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 10px;
      align-items: start;
    }

    .lead-name {
      min-width: 0;
      font-size: 20px;
      font-weight: 900;
      line-height: 1.12;
      overflow-wrap: anywhere;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      min-height: 28px;
      border-radius: 999px;
      padding: 4px 9px;
      font-size: 12px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .status-pill.status-new {
      background: var(--amber-soft);
      color: var(--amber);
    }

    .status-pill.status-working,
    .status-pill.status-quoted {
      background: var(--blue-soft);
      color: var(--blue);
    }

    .status-pill.status-booked {
      background: var(--green-soft);
      color: var(--green);
    }

    .status-pill.status-cold,
    .status-pill.status-lost {
      background: var(--red-soft);
      color: var(--red);
    }

    .event-line {
      color: #2e3444;
      font-size: 15px;
      font-weight: 750;
      overflow-wrap: anywhere;
    }

    .touch-line {
      display: inline-flex;
      width: fit-content;
      align-items: center;
      min-height: 34px;
      border-radius: 999px;
      padding: 6px 10px;
      background: var(--slate-soft);
      color: var(--slate);
      font-size: 15px;
      font-weight: 900;
    }

    .touch-line.urgent {
      background: var(--red-soft);
      color: var(--red);
    }

    .touch-line.fresh {
      background: var(--green-soft);
      color: var(--green);
    }

    .contact-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 14px 14px;
    }

    .contact-link {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 44px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--soft);
      color: var(--ink);
      padding: 9px 12px;
      font-size: 15px;
      font-weight: 850;
      text-decoration: none;
    }

    .action-panel {
      display: grid;
      gap: 12px;
      border-top: 1px solid var(--line);
      background: #fbfcff;
      padding: 14px;
    }

    .saved-note {
      min-height: 40px;
      display: flex;
      align-items: center;
      border-radius: var(--radius);
      background: var(--green-soft);
      color: var(--green);
      padding: 9px 11px;
      font-weight: 850;
    }

    .note-row {
      display: grid;
      gap: 7px;
    }

    .action-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .action-button {
      background: #fff;
      border-color: var(--line);
      color: var(--ink);
      font-size: 15px;
    }

    .action-button[data-action="contacted"] {
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .action-button[data-action="quote_sent"],
    .action-button[data-action="qualified"] {
      border-color: #b7cae8;
      background: var(--blue-soft);
      color: #173e73;
    }

    .action-button[data-action="booked"] {
      background: #173f30;
      border-color: #173f30;
      color: #fff;
    }

    .action-button[data-action="went_cold"],
    .action-button[data-action="lost"] {
      border-color: #efb9ad;
      background: #fff7f5;
      color: #803121;
    }

    .extra-box {
      display: grid;
      gap: 9px;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      padding: 11px;
    }

    .save-extra {
      background: var(--ink);
      color: #fff;
    }

    details {
      border-top: 1px solid var(--line);
      padding-top: 10px;
      color: var(--muted);
      font-size: 13px;
    }

    summary {
      min-height: 34px;
      width: fit-content;
      cursor: pointer;
      font-weight: 850;
    }

    .details-grid {
      display: grid;
      gap: 5px;
      margin-top: 8px;
      overflow-wrap: anywhere;
    }

    .empty,
    .error {
      padding: 16px;
      color: var(--muted);
    }

    .toast {
      position: fixed;
      right: 14px;
      bottom: 14px;
      z-index: 30;
      max-width: min(380px, calc(100vw - 28px));
      border-radius: var(--radius);
      background: var(--ink);
      color: #fff;
      padding: 12px 14px;
      box-shadow: var(--shadow);
      font-weight: 850;
      opacity: 0;
      pointer-events: none;
      transform: translateY(14px);
      transition: opacity 160ms ease, transform 160ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    .hidden {
      display: none !important;
    }

    @media (min-width: 640px) {
      .shell {
        padding: 22px;
      }

      .action-grid {
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }
  </style>
</head>
<body>
  <main class="shell">
    <header class="topbar">
      <h1>Lead Logger</h1>
      <div class="sync" id="sync">Locked</div>
    </header>

    <section class="auth" id="auth">
      <label for="token">Access token</label>
      <div class="auth-row">
        <input id="token" type="password" autocomplete="current-password" inputmode="text">
        <button class="primary" id="save-token" type="button">Save</button>
      </div>
    </section>

    <section class="summary hidden" id="summary" aria-label="Lead summary">
      <div class="metric"><strong id="metric-action">0</strong><span>Need action</span></div>
      <div class="metric"><strong id="metric-never">0</strong><span>Never touched</span></div>
      <div class="metric"><strong id="metric-booked">0</strong><span>Booked</span></div>
    </section>

    <section class="lead-list" id="leads" aria-label="Paid leads"></section>
  </main>

  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script>
    const tokenKey = 'musicangel.leadLogger.token';
    const openStatuses = new Set(['pending', 'qualified', 'quoted', 'unreachable']);
    const settledStatuses = new Set(['booked', 'lost']);
    const actionLabels = {
      contacted: 'Contacted',
      qualified: 'Qualified',
      quote_sent: 'Quote sent',
      booked: 'Booked',
      went_cold: 'Went cold',
      lost: 'Lost'
    };

    const state = {
      token: localStorage.getItem(tokenKey) || '',
      leads: [],
      selectedId: '',
      saving: false,
      extraAction: '',
      showSettled: false,
      lastSaved: null
    };

    const els = {
      auth: document.getElementById('auth'),
      token: document.getElementById('token'),
      saveToken: document.getElementById('save-token'),
      sync: document.getElementById('sync'),
      summary: document.getElementById('summary'),
      metricAction: document.getElementById('metric-action'),
      metricNever: document.getElementById('metric-never'),
      metricBooked: document.getElementById('metric-booked'),
      leads: document.getElementById('leads'),
      toast: document.getElementById('toast')
    };

    function escapeHtml(value) {
      return String(value == null ? '' : value)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function clean(value) {
      return String(value == null ? '' : value).trim();
    }

    function normalizeLead(lead) {
      return {
        ...lead,
        name: clean(lead.name),
        email: clean(lead.email),
        phone: clean(lead.phone),
        band_requested: clean(lead.band_requested),
        wedding_date: clean(lead.wedding_date),
        venue: clean(lead.venue),
        county: clean(lead.county),
        lifecycle_status: clean(lead.lifecycle_status) || 'pending',
        quote_status: clean(lead.quote_status),
        booking_status: clean(lead.booking_status),
        lead_id: clean(lead.lead_id),
        attribution_bucket: clean(lead.attribution_bucket),
        landing_page: clean(lead.landing_page),
        notes: clean(lead.notes)
      };
    }

    function personLabel(lead) {
      return lead.name || lead.email || lead.phone || lead.lead_id || 'Lead';
    }

    function dateLabel(value) {
      const raw = clean(value);
      if (!raw) return '';

      const yearMonth = raw.match(/^(\d{4})-(\d{2})$/);
      const exactDate = raw.match(/^(\d{4})-(\d{2})-(\d{2})/);
      if (yearMonth || exactDate) {
        const date = exactDate
          ? new Date(`${exactDate[1]}-${exactDate[2]}-${exactDate[3]}T12:00:00Z`)
          : new Date(`${yearMonth[1]}-${yearMonth[2]}-01T12:00:00Z`);
        if (!Number.isNaN(date.getTime())) {
          const options = exactDate
            ? { day: 'numeric', month: 'short', year: 'numeric' }
            : { month: 'short', year: 'numeric' };
          return new Intl.DateTimeFormat('en-IE', options).format(date);
        }
      }

      return raw;
    }

    function eventLine(lead) {
      const parts = [
        lead.band_requested || 'Band not logged',
        dateLabel(lead.wedding_date),
        lead.county || lead.venue
      ].filter(Boolean);

      return parts.length ? parts.join(' · ') : 'Event details not logged';
    }

    function statusKind(lead) {
      const lifecycle = lead.lifecycle_status;
      if (lead.booking_status === 'booked' || lifecycle === 'booked') return 'booked';
      if (lead.booking_status === 'lost' || lifecycle === 'lost') return 'lost';
      if (lifecycle === 'unreachable') return 'cold';
      if (lifecycle === 'quoted') return 'quoted';
      if (lifecycle === 'qualified') return 'working';
      return 'new';
    }

    function statusLabel(lead) {
      const kind = statusKind(lead);
      if (kind === 'new') return 'New';
      if (kind === 'working') return 'Working';
      if (kind === 'quoted') return 'Quoted';
      if (kind === 'booked') return 'Booked';
      if (kind === 'cold') return 'Cold';
      if (kind === 'lost') return 'Lost';
      return 'New';
    }

    function isSettled(lead) {
      return settledStatuses.has(statusKind(lead)) || settledStatuses.has(lead.lifecycle_status);
    }

    function daysSinceLastContact(lead) {
      if (lead.days_since_last_contact != null && lead.days_since_last_contact !== '') {
        return Number(lead.days_since_last_contact);
      }
      if (!lead.last_contact_at) return null;
      const t = Date.parse(lead.last_contact_at);
      if (Number.isNaN(t)) return null;
      return Math.max(0, (Date.now() - t) / 86400000);
    }

    function touchLabel(lead) {
      const days = daysSinceLastContact(lead);
      if (days == null) return 'Never contacted';
      if (days < 0.5) return 'Last touched today';
      if (days < 1.5) return 'Last touched 1 day ago';
      return `Last touched ${Math.round(days)} days ago`;
    }

    function touchClass(lead) {
      const days = daysSinceLastContact(lead);
      if (days == null || statusKind(lead) === 'cold') return 'urgent';
      if (days < 1.5) return 'fresh';
      if (days >= 5) return 'urgent';
      return '';
    }

    function needsAction(lead) {
      if (isSettled(lead)) return false;
      const days = daysSinceLastContact(lead);
      return days == null || days >= 3 || statusKind(lead) === 'cold';
    }

    function priority(lead) {
      if (isSettled(lead)) return 90;
      if (daysSinceLastContact(lead) == null) return 0;
      if (statusKind(lead) === 'cold') return 1;
      if (needsAction(lead)) return 2;
      if (statusKind(lead) === 'quoted') return 3;
      if (statusKind(lead) === 'working') return 4;
      return 5;
    }

    function sortedLeads() {
      return [...state.leads].sort((a, b) => {
        const pa = priority(a);
        const pb = priority(b);
        if (pa !== pb) return pa - pb;

        const da = daysSinceLastContact(a);
        const db = daysSinceLastContact(b);
        if (da == null && db == null) return Number(b.age_days || 0) - Number(a.age_days || 0);
        if (da == null) return -1;
        if (db == null) return 1;
        if (Math.round(db) !== Math.round(da)) return db - da;
        return Number(b.age_days || 0) - Number(a.age_days || 0);
      });
    }

    function telHref(phone) {
      const stripped = clean(phone).replace(/[^\d+]/g, '');
      return stripped ? `tel:${stripped}` : '';
    }

    function mailHref(email) {
      return clean(email) ? `mailto:${clean(email)}` : '';
    }

    function showToast(message) {
      const toast = els.toast;
      toast.textContent = message;
      toast.classList.add('show');
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => toast.classList.remove('show'), 2400);
    }

    function setSync(text) {
      els.sync.textContent = text;
    }

    async function api(path, options = {}) {
      const response = await fetch(path, {
        ...options,
        headers: {
          Authorization: `Bearer ${state.token}`,
          'Content-Type': 'application/json',
          ...(options.headers || {})
        }
      });
      const data = await response.json().catch(() => ({}));
      if (!response.ok) throw new Error(data.error || `Request failed (${response.status})`);
      return data;
    }

    async function loadLeads() {
      if (!state.token) {
        setSync('Locked');
        els.auth.classList.remove('hidden');
        els.summary.classList.add('hidden');
        els.leads.innerHTML = '';
        return;
      }

      setSync('Syncing');
      try {
        const data = await api('/leads');
        state.leads = (data.leads || []).map(normalizeLead);
        if (!state.selectedId && state.leads.length) state.selectedId = sortedLeads()[0].lead_id;
        els.auth.classList.add('hidden');
        els.summary.classList.remove('hidden');
        render();
        setSync(new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }));
      } catch (error) {
        setSync('Error');
        els.auth.classList.remove('hidden');
        els.leads.innerHTML = `<div class="error">${escapeHtml(error.message)}</div>`;
      }
    }

    function renderSummary() {
      const action = state.leads.filter(needsAction).length;
      const never = state.leads.filter((lead) => daysSinceLastContact(lead) == null && !isSettled(lead)).length;
      const booked = state.leads.filter((lead) => statusKind(lead) === 'booked').length;
      els.metricAction.textContent = action;
      els.metricNever.textContent = never;
      els.metricBooked.textContent = booked;
    }

    function renderContactLinks(lead) {
      const phoneLink = telHref(lead.phone);
      const emailLink = mailHref(lead.email);
      if (!phoneLink && !emailLink) return '';

      return `
        <div class="contact-row">
          ${phoneLink ? `<a class="contact-link" href="${escapeHtml(phoneLink)}">Call</a>` : ''}
          ${phoneLink ? `<a class="contact-link" href="sms:${escapeHtml(phoneLink.replace(/^tel:/, ''))}">Text</a>` : ''}
          ${emailLink ? `<a class="contact-link" href="${escapeHtml(emailLink)}">Email</a>` : ''}
        </div>
      `;
    }

    function renderDetails(lead) {
      return `
        <details>
          <summary>Details</summary>
          <div class="details-grid">
            <div><strong>Lead ID:</strong> ${escapeHtml(lead.lead_id || 'not available')}</div>
            <div><strong>Attribution:</strong> ${escapeHtml(lead.attribution_bucket || 'not available')}</div>
            <div><strong>Landing page:</strong> ${escapeHtml(lead.landing_page || 'not available')}</div>
            <div><strong>Created:</strong> ${escapeHtml(lead.created_at || 'not available')}</div>
            <div><strong>Quote status:</strong> ${escapeHtml(lead.quote_status || 'not set')}</div>
            <div><strong>Booking status:</strong> ${escapeHtml(lead.booking_status || 'not set')}</div>
          </div>
        </details>
      `;
    }

    function renderExtraBox() {
      if (state.extraAction === 'booked') {
        return `
          <div class="extra-box">
            <label for="booking-value">Booking value</label>
            <input id="booking-value" type="number" min="0" step="1" inputmode="decimal" placeholder="Optional">
            <button class="save-extra" type="button" data-save-extra="booked">Save booked</button>
          </div>
        `;
      }

      if (state.extraAction === 'lost') {
        return `
          <div class="extra-box">
            <label for="lost-reason">Lost reason</label>
            <input id="lost-reason" type="text" maxlength="500" placeholder="Required">
            <button class="save-extra" type="button" data-save-extra="lost">Save lost</button>
          </div>
        `;
      }

      return '';
    }

    function renderActionPanel(lead) {
      const saved = state.lastSaved && state.lastSaved.leadId === lead.lead_id
        ? `<div class="saved-note">Saved: ${escapeHtml(state.lastSaved.label)}</div>`
        : '';

      return `
        <div class="action-panel">
          ${saved}
          <div class="note-row">
            <label for="note-${escapeHtml(lead.lead_id)}">Notes</label>
            <textarea id="note-${escapeHtml(lead.lead_id)}" maxlength="2000" placeholder="Optional note for this update"></textarea>
          </div>
          <div class="action-grid">
            ${Object.entries(actionLabels).map(([action, label]) => `
              <button class="action-button" type="button" data-action="${action}" ${state.saving ? 'disabled' : ''}>
                ${escapeHtml(label)}
              </button>
            `).join('')}
          </div>
          ${renderExtraBox()}
          ${renderDetails(lead)}
        </div>
      `;
    }

    function renderCard(lead) {
      const selected = lead.lead_id === state.selectedId;
      const kind = statusKind(lead);
      const justSaved = state.lastSaved && state.lastSaved.leadId === lead.lead_id;
      const touch = touchClass(lead);

      return `
        <article class="lead-card status-${escapeHtml(kind)} ${selected ? 'selected' : ''} ${justSaved ? 'saved' : ''}">
          <button class="lead-select" type="button" data-lead-id="${escapeHtml(lead.lead_id)}" aria-expanded="${selected ? 'true' : 'false'}">
            <span class="lead-top">
              <span class="lead-name">${escapeHtml(personLabel(lead))}</span>
              <span class="status-pill status-${escapeHtml(kind)}">${escapeHtml(statusLabel(lead))}</span>
            </span>
            <span class="event-line">${escapeHtml(eventLine(lead))}</span>
            <span class="touch-line ${escapeHtml(touch)}">${escapeHtml(touchLabel(lead))}</span>
          </button>
          ${renderContactLinks(lead)}
          ${selected ? renderActionPanel(lead) : ''}
        </article>
      `;
    }

    function renderGroup(title, leads) {
      if (!leads.length) return '';
      return `
        <section class="group">
          <div class="group-head"><span>${escapeHtml(title)}</span><span>${leads.length}</span></div>
          ${leads.map(renderCard).join('')}
        </section>
      `;
    }

    function renderSettled(settled) {
      if (!settled.length) return '';
      if (!state.showSettled) {
        return `
          <section class="group">
            <button class="settled-toggle" type="button" data-toggle-settled="true">
              Show booked/lost leads (${settled.length})
            </button>
          </section>
        `;
      }

      return `
        <section class="group">
          <div class="group-head">
            <span>Booked or lost</span>
            <button class="settled-toggle" type="button" data-toggle-settled="false">Hide</button>
          </div>
          ${settled.map(renderCard).join('')}
        </section>
      `;
    }

    function renderLeads() {
      if (!state.leads.length) {
        els.leads.innerHTML = '<div class="empty">No paid leads returned.</div>';
        return;
      }

      const ordered = sortedLeads();
      const action = ordered.filter(needsAction);
      const working = ordered.filter((lead) => !needsAction(lead) && !isSettled(lead));
      const settled = ordered.filter(isSettled);

      els.leads.innerHTML = [
        renderGroup('Needs action', action),
        renderGroup('In progress', working),
        renderSettled(settled)
      ].filter(Boolean).join('');
    }

    function render() {
      renderSummary();
      renderLeads();
    }

    function selectedLead() {
      return state.leads.find((lead) => lead.lead_id === state.selectedId);
    }

    function noteValue(lead) {
      return document.getElementById(`note-${lead.lead_id}`)?.value || '';
    }

    function mergeLead(existing, updated) {
      const cleaned = {};
      for (const [key, value] of Object.entries(updated || {})) {
        if (value !== undefined) cleaned[key] = value;
      }
      return normalizeLead({ ...existing, ...cleaned });
    }

    async function submitAction(action) {
      const lead = selectedLead();
      if (!lead || state.saving) return;

      if (action === 'booked' && state.extraAction !== 'booked') {
        state.extraAction = 'booked';
        render();
        document.getElementById('booking-value')?.focus();
        return;
      }

      if (action === 'lost' && state.extraAction !== 'lost') {
        state.extraAction = 'lost';
        render();
        document.getElementById('lost-reason')?.focus();
        return;
      }

      const payload = {
        action,
        notes: noteValue(lead)
      };

      if (action === 'booked') {
        const value = document.getElementById('booking-value')?.value || '';
        if (value) payload.booking_value = value;
      }

      if (action === 'lost') {
        const lostReason = document.getElementById('lost-reason')?.value || '';
        if (!lostReason.trim()) {
          showToast('Lost reason required');
          document.getElementById('lost-reason')?.focus();
          return;
        }
        payload.lost_reason = lostReason;
      }

      state.saving = true;
      setSync('Saving');
      render();

      try {
        const data = await api(`/leads/${encodeURIComponent(lead.lead_id)}/update`, {
          method: 'POST',
          body: JSON.stringify(payload)
        });
        state.leads = state.leads.map((item) => (
          item.lead_id === lead.lead_id ? mergeLead(item, data.updated_lead) : item
        ));
        state.extraAction = '';
        state.lastSaved = { leadId: lead.lead_id, label: actionLabels[action] };
        showToast(`${actionLabels[action]} saved`);
        setSync('Saved');
        render();
      } catch (error) {
        showToast(error.message);
        setSync('Error');
      } finally {
        state.saving = false;
        render();
      }
    }

    els.saveToken.addEventListener('click', () => {
      state.token = els.token.value.trim();
      localStorage.setItem(tokenKey, state.token);
      loadLeads();
    });

    els.token.addEventListener('keydown', (event) => {
      if (event.key === 'Enter') {
        event.preventDefault();
        els.saveToken.click();
      }
    });

    els.leads.addEventListener('click', (event) => {
      const toggle = event.target.closest('[data-toggle-settled]');
      if (toggle) {
        state.showSettled = toggle.dataset.toggleSettled === 'true';
        render();
        return;
      }

      const saveExtra = event.target.closest('[data-save-extra]');
      if (saveExtra) {
        submitAction(saveExtra.dataset.saveExtra);
        return;
      }

      const action = event.target.closest('[data-action]');
      if (action) {
        submitAction(action.dataset.action);
        return;
      }

      const row = event.target.closest('[data-lead-id]');
      if (!row) return;
      state.selectedId = row.dataset.leadId;
      state.extraAction = '';
      render();
    });

    els.token.value = state.token;
    loadLeads();
  </script>
</body>
</html>
