name: Regenerate pages on data change

on:
  push:
    branches: [master]
    paths:
      - 'data/**'
      - 'scripts/generate-pages.js'

permissions:
  contents: write

jobs:
  regenerate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Regenerate pages + sitemap
        run: node scripts/generate-pages.js

      - name: Commit regenerated files if any changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A wedding-band-*/ wedding-bands-*/ venues/ sitemap.xml
          if git diff --cached --quiet; then
            echo "No regeneration changes — exiting clean."
          else
            git commit -m "chore: regenerate pages from data update [skip ci]"
            git push
          fi
