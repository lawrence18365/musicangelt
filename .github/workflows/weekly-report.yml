name: Weekly GSC + GA4 digest

on:
  schedule:
    # Mondays at 08:00 UTC (09:00 Dublin)
    - cron: '0 8 * * 1'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Restore GSC + GA4 tokens from secrets
        env:
          GSC_TOKEN_JSON: ${{ secrets.GSC_TOKEN_JSON }}
          GA4_TOKEN_JSON: ${{ secrets.GA4_TOKEN_JSON }}
        run: |
          mkdir -p .tokens
          echo "$GSC_TOKEN_JSON" > .tokens/.gsc-token.json
          echo "$GA4_TOKEN_JSON" > .tokens/.ga4-admin-token.json
          # Reasonable file permissions
          chmod 600 .tokens/*.json

      - name: Generate weekly report
        env:
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GSC_TOKEN_PATH: .tokens/.gsc-token.json
          GA4_TOKEN_PATH: .tokens/.ga4-admin-token.json
        run: |
          node scripts/weekly-report.js --days=7

      - name: Cleanup tokens
        if: always()
        run: rm -rf .tokens

      - name: Commit + push if report changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports/
          if git diff --cached --quiet; then
            echo "No report changes."
          else
            DATE=$(date -u +%Y-%m-%d)
            git commit -m "chore: weekly report ${DATE} [skip ci]"
            git push
          fi
